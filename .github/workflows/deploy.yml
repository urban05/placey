name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          PAYLOAD='{}'
          SIG="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | sed 's/.*= //')"
          curl -f -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            ${{ secrets.WEBHOOK_URL }}
